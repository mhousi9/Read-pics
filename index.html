<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FotoText – Extrakce textu z fotek</title>
  <meta name="description" content="Nahraje fotky a vytáhněte text okamžitě" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #47ffd4;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff4747;
      --success: #47ff8a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-badge {
      font-size: 0.65rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* MAIN LAYOUT */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 77px);
    }

    /* LEFT PANEL */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
    }

    /* DROP ZONE */
    .drop-zone {
      margin: 20px;
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(232,255,71,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(232,255,71,0.03);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .drop-text {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .drop-text strong {
      color: var(--accent);
      font-weight: 500;
    }

    /* IMAGE LIST */
    .image-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .image-list::-webkit-scrollbar { width: 4px; }
    .image-list::-webkit-scrollbar-track { background: transparent; }
    .image-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .image-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      transition: border-color 0.2s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .image-item.processing { border-color: var(--accent2); }
    .image-item.done { border-color: var(--success); }
    .image-item.error { border-color: var(--danger); }

    .item-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .item-info { overflow: hidden; }

    .item-name {
      font-size: 0.75rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .item-status {
      font-size: 0.65rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.processing {
      background: var(--accent2);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-dot.done { background: var(--success); }
    .status-dot.error { background: var(--danger); }

    .item-order {
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* CONTROLS */
    .controls {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 500;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 700;
    }

    .btn-primary:hover:not(:disabled) {
      background: #d4ea30;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--muted);
    }

    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

    /* RIGHT PANEL */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .output-area::-webkit-scrollbar { width: 4px; }
    .output-area::-webkit-scrollbar-track { background: transparent; }
    .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .output-placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }

    .output-placeholder .icon {
      font-size: 3rem;
      opacity: 0.3;
    }

    .output-placeholder p {
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .result-block {
      margin-bottom: 28px;
      animation: fadeIn 0.4s ease;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .result-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(232,255,71,0.1);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .result-name {
      font-size: 0.7rem;
      color: var(--muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .result-copy-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .result-text {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* BOTTOM BAR */
    .output-actions {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-copy-all {
      background: var(--accent2);
      color: #0a0a0a;
      font-weight: 700;
    }

    .btn-copy-all:hover:not(:disabled) {
      background: #2fe0bc;
    }

    .chars-count {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--muted);
    }

    /* SPINNER */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0a0a0a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* EMPTY STATE */
    .empty-list {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      font-size: 0.75rem;
      display: none;
    }

    /* PROGRESS BAR */
    .progress-bar {
      height: 2px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s ease;
      width: 0%;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* API KEY BAR */
    .apikey-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .apikey-label {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .apikey-input {
      flex: 1;
      max-width: 400px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .apikey-input:focus { border-color: var(--accent); }
    .apikey-input::placeholder { color: var(--muted); }
    .apikey-hint {
      font-size: 0.65rem;
      color: var(--muted);
    }
    .apikey-hint a { color: var(--accent2); text-decoration: none; }
    .apikey-hint a:hover { text-decoration: underline; }

    /* MOBILE */
    @media (max-width: 768px) {
      header { padding: 14px 20px; }
      .apikey-bar { padding: 10px 16px; flex-wrap: wrap; }
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
        height: auto;
        min-height: calc(100vh - 65px);
      }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    }

    /* DRAG REORDER */
    .image-item.dragging {
      opacity: 0.4;
      border: 1px dashed var(--accent);
    }
    .image-item[draggable] { cursor: grab; }
    .image-item[draggable]:active { cursor: grabbing; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">📷</div>
      <div class="logo-text">Foto<span>Text</span></div>
    </div>
    <div class="header-badge">OCR · AI Extrakce</div>
  </header>

  <div class="apikey-bar">
    <span class="apikey-label">🔑 API klíč:</span>
    <input class="apikey-input" type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" />
    <span class="apikey-hint">Získej na <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> · klíč se neukládá</span>
  </div>

  <main>
    <!-- LEFT: Upload & File List -->
    <div class="panel-left">
      <div class="panel-header">
        <span class="panel-title">Fotografie</span>
        <span class="count-badge" id="countBadge">0 souborů</span>
      </div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" multiple />
        <span class="drop-icon">📁</span>
        <div class="drop-text">
          <strong>Klikni nebo přetáhni fotky</strong><br>
          JPG, PNG, WEBP · více souborů najednou<br>
          <span style="font-size:0.7rem; color: var(--muted)">Pořadí = pořadí zpracování</span>
        </div>
      </div>

      <div class="image-list" id="imageList"></div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="extractBtn" disabled>
          <span>▶ Extrahovat text</span>
        </button>
        <button class="btn btn-ghost" id="clearBtn" disabled>✕ Vyčistit</button>
      </div>
    </div>

    <!-- RIGHT: Results -->
    <div class="panel-right">
      <div class="panel-header">
        <span class="panel-title">Výsledný text</span>
        <span class="count-badge" id="resultBadge">–</span>
      </div>

      <div class="output-area" id="outputArea">
        <div class="output-placeholder" id="placeholder">
          <span class="icon">✦</span>
          <p>Nahraj fotografie a klikni<br><strong style="color:var(--accent)">Extrahovat text</strong></p>
        </div>
      </div>

      <div class="output-actions">
        <button class="btn btn-copy-all btn-primary" id="copyAllBtn" disabled style="max-width: 200px; background: var(--accent2); color:#0a0a0a; font-weight:700;">
          ⎘ Zkopírovat vše
        </button>
        <button class="btn btn-ghost" id="downloadBtn" disabled style="max-width: 160px;">
          ↓ Stáhnout .txt
        </button>
        <span class="chars-count" id="charsCount"></span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

let files = []; // { file, id, status, text }
let idCounter = 0;
let isProcessing = false;

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const imageList = document.getElementById('imageList');
const extractBtn = document.getElementById('extractBtn');
const clearBtn = document.getElementById('clearBtn');
const copyAllBtn = document.getElementById('copyAllBtn');
const downloadBtn = document.getElementById('downloadBtn');
const outputArea = document.getElementById('outputArea');
const placeholder = document.getElementById('placeholder');
const countBadge = document.getElementById('countBadge');
const resultBadge = document.getElementById('resultBadge');
const progressFill = document.getElementById('progressFill');
const charsCount = document.getElementById('charsCount');

// ── File handling ──────────────────────────────────────────
fileInput.addEventListener('change', e => addFiles([...e.target.files]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    const id = ++idCounter;
    files.push({ file: f, id, status: 'waiting', text: '' });
  });
  renderList();
  updateUI();
  fileInput.value = '';
}

function renderList() {
  imageList.innerHTML = '';
  if (files.length === 0) return;

  files.forEach((item, idx) => {
    const url = URL.createObjectURL(item.file);
    const div = document.createElement('div');
    div.className = `image-item ${item.status !== 'waiting' ? item.status : ''}`;
    div.dataset.id = item.id;
    div.draggable = !isProcessing;
    div.innerHTML = `
      <img class="item-thumb" src="${url}" alt="" />
      <div class="item-info">
        <div class="item-name">${item.file.name}</div>
        <div class="item-status">
          <span class="status-dot ${item.status === 'waiting' ? '' : item.status}"></span>
          <span>${statusLabel(item.status)}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div class="item-order">${idx + 1}</div>
        ${item.status === 'waiting' && !isProcessing ? `<button onclick="removeFile(${item.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;line-height:1;" title="Odebrat">✕</button>` : ''}
      </div>
    `;
    setupDrag(div);
    imageList.appendChild(div);
  });
}

function statusLabel(s) {
  return { waiting: 'Čeká', processing: 'Zpracovávám...', done: 'Hotovo', error: 'Chyba' }[s] || s;
}

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  renderList();
  updateUI();
  renderResults();
}

function updateUI() {
  const n = files.length;
  countBadge.textContent = `${n} ${n === 1 ? 'soubor' : n < 5 ? 'soubory' : 'souborů'}`;
  extractBtn.disabled = n === 0 || isProcessing;
  clearBtn.disabled = n === 0 || isProcessing;
  const done = files.filter(f => f.status === 'done');
  copyAllBtn.disabled = done.length === 0;
  downloadBtn.disabled = done.length === 0;
  resultBadge.textContent = done.length > 0 ? `${done.length} stran` : '–';
  const total = done.map(f => f.text).join('').length;
  charsCount.textContent = total > 0 ? `${total.toLocaleString()} znaků` : '';
}

// ── Drag-to-reorder ────────────────────────────────────────
let dragSrcId = null;
function setupDrag(el) {
  el.addEventListener('dragstart', () => { dragSrcId = parseInt(el.dataset.id); el.classList.add('dragging'); });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
  el.addEventListener('dragover', e => { e.preventDefault(); });
  el.addEventListener('drop', e => {
    e.preventDefault();
    const targetId = parseInt(el.dataset.id);
    if (dragSrcId && dragSrcId !== targetId) {
      const srcIdx = files.findIndex(f => f.id === dragSrcId);
      const tgtIdx = files.findIndex(f => f.id === targetId);
      const [moved] = files.splice(srcIdx, 1);
      files.splice(tgtIdx, 0, moved);
      renderList();
    }
  });
}

// ── Extraction ────────────────────────────────────────────
extractBtn.addEventListener('click', startExtraction);

async function startExtraction() {
  if (isProcessing || files.length === 0) return;
  isProcessing = true;

  // Reset
  files.forEach(f => { f.status = 'waiting'; f.text = ''; });
  renderList();
  renderResults();
  updateUI();

  const total = files.length;
  let done = 0;

  for (let i = 0; i < files.length; i++) {
    const item = files[i];
    item.status = 'processing';
    renderList();

    try {
      const b64 = await toBase64(item.file);
      const mediaType = item.file.type || 'image/jpeg';
      const text = await extractText(b64, mediaType, item.file.name, i + 1, total);
      item.text = text;
      item.status = 'done';
    } catch (err) {
      item.text = `[Chyba: ${err.message}]`;
      item.status = 'error';
    }

    done++;
    progressFill.style.width = `${(done / total) * 100}%`;
    renderList();
    renderResults();
    updateUI();
  }

  isProcessing = false;
  renderList();
  updateUI();
  progressFill.style.width = '0%';
  showToast('✓ Extrakce dokončena');
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Nelze načíst soubor'));
    r.readAsDataURL(file);
  });
}

async function extractText(b64, mediaType, name, idx, total) {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) throw new Error('Chybí API klíč – zadej ho do pole nahoře');

  const response = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 4096,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: mediaType, data: b64 }
          },
          {
            type: 'text',
            text: `Jsi OCR asistent. Toto je fotografie č. ${idx} z celkem ${total} (název: ${name}).

Extrahuj VEŠKERÝ text z obrázku přesně tak, jak je napsán – zachovej:
- původní formátování a odstavce
- pořadí řádků  
- interpunkci a diakritiku
- čísla a speciální znaky

Vrať POUZE čistý text bez jakéhokoli komentáře, vysvětlení nebo uvozovek. Pokud na obrázku není žádný text, vrať prázdnou odpověď.`
          }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  return data.content?.map(c => c.text || '').join('') || '';
}

// ── Results rendering ─────────────────────────────────────
function renderResults() {
  const done = files.filter(f => f.status === 'done' || f.status === 'error');
  outputArea.innerHTML = '';

  if (done.length === 0) {
    outputArea.appendChild(placeholder);
    return;
  }

  files.forEach((item, idx) => {
    if (item.status !== 'done' && item.status !== 'error') return;
    const block = document.createElement('div');
    block.className = 'result-block';
    block.innerHTML = `
      <div class="result-header">
        <span class="result-num">#${idx + 1}</span>
        <span class="result-name">${item.file.name}</span>
        <button class="result-copy-btn" onclick="copyOne(${item.id})">⎘ Kopírovat</button>
      </div>
      <div class="result-text" id="text-${item.id}">${escHtml(item.text || '(Žádný text nebyl nalezen)')}</div>
    `;
    if (idx < files.filter(f => f.status === 'done' || f.status === 'error').length - 1) {
      block.innerHTML += '<hr class="result-divider">';
    }
    outputArea.appendChild(block);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyOne(id) {
  const item = files.find(f => f.id === id);
  if (!item) return;
  navigator.clipboard.writeText(item.text).then(() => showToast('✓ Text zkopírován'));
}

// ── Copy All ──────────────────────────────────────────────
copyAllBtn.addEventListener('click', () => {
  const allText = files
    .filter(f => f.status === 'done')
    .map((f, i) => `=== Strana ${i + 1}: ${f.file.name} ===\n${f.text}`)
    .join('\n\n');
  navigator.clipboard.writeText(allText).then(() => showToast('✓ Veškerý text zkopírován'));
});

// ── Download ──────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  const allText = files
    .filter(f => f.status === 'done')
    .map((f, i) => `=== Strana ${i + 1}: ${f.file.name} ===\n${f.text}`)
    .join('\n\n');
  const blob = new Blob([allText], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fototext-${Date.now()}.txt`;
  a.click();
  showToast('✓ Soubor stažen');
});

// ── Clear ──────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  files = [];
  renderList();
  renderResults();
  updateUI();
  progressFill.style.width = '0%';
});

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
