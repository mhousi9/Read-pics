<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FotoText – OCR zdarma</title>
  <meta name="description" content="Extrakce textu z fotek bez API klíče" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: #2a2a2a; --accent: #e8ff47; --accent2: #47ffd4;
      --text: #f0f0f0; --muted: #666; --danger: #ff4747; --success: #47ff8a;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto auto 1fr; }

    header { border-bottom: 1px solid var(--border); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; }
    .logo-text span { color: var(--accent); }
    .free-badge { font-size: 0.62rem; background: rgba(71,255,212,0.12); border: 1px solid var(--accent2); color: var(--accent2); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase; }

    .lang-bar { border-bottom: 1px solid var(--border); padding: 10px 40px; display: flex; align-items: center; gap: 14px; background: var(--surface); flex-wrap: wrap; }
    .lang-label { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
    .lang-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 6px 10px; outline: none; cursor: pointer; transition: border-color 0.15s; }
    .lang-select:focus { border-color: var(--accent); }
    .lang-note { font-size: 0.65rem; color: var(--muted); }

    main { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 113px); }
    .panel-left { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }

    .panel-header { padding: 18px 26px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .count-badge { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; }

    .drop-zone { margin: 18px; border: 1.5px dashed var(--border); border-radius: 12px; padding: 28px 18px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; overflow: hidden; }
    .drop-zone::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(232,255,71,0.05), transparent 70%); pointer-events: none; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(232,255,71,0.03); }
    .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
    .drop-text { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }
    .drop-text strong { color: var(--accent); font-weight: 500; }

    .image-list { flex: 1; overflow-y: auto; padding: 0 18px 18px; display: flex; flex-direction: column; gap: 9px; }
    .image-list::-webkit-scrollbar { width: 4px; }
    .image-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .image-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px; display: grid; grid-template-columns: auto 1fr auto; gap: 11px; align-items: center; transition: border-color 0.2s; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .image-item.processing { border-color: var(--accent2); }
    .image-item.done { border-color: var(--success); }
    .image-item.error { border-color: var(--danger); }
    .item-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; }
    .item-info { overflow: hidden; }
    .item-name { font-size: 0.72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .item-status { font-size: 0.63rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-dot.processing { background: var(--accent2); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .status-dot.done { background: var(--success); }
    .status-dot.error { background: var(--danger); }
    .item-order { font-size: 0.63rem; color: var(--muted); background: var(--surface2); width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .item-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .item-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.2s; width: 0%; }

    .controls { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 9px; }
    .btn { flex: 1; padding: 11px 14px; border: none; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.76rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px; font-weight: 500; }
    .btn-primary { background: var(--accent); color: #0a0a0a; font-weight: 700; }
    .btn-primary:hover:not(:disabled) { background: #d4ea30; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
    .btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }

    .output-area { flex: 1; overflow-y: auto; padding: 22px 26px; }
    .output-area::-webkit-scrollbar { width: 4px; }
    .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .output-placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); text-align: center; }
    .output-placeholder .icon { font-size: 2.8rem; opacity: 0.25; }
    .output-placeholder p { font-size: 0.78rem; line-height: 1.7; }

    .result-block { margin-bottom: 26px; animation: fadeIn 0.4s ease; }
    .result-header { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
    .result-num { font-family: 'Syne', sans-serif; font-size: 0.63rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); background: rgba(232,255,71,0.1); padding: 3px 9px; border-radius: 20px; }
    .result-name { font-size: 0.68rem; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 0.63rem; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .result-copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .result-text { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-size: 0.8rem; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .result-divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

    .output-actions { padding: 14px 26px; border-top: 1px solid var(--border); display: flex; gap: 9px; align-items: center; }
    .chars-count { margin-left: auto; font-size: 0.66rem; color: var(--muted); }

    .progress-bar { height: 2px; background: var(--border); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; width: 0%; }

    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 11px 20px; border-radius: 10px; font-size: 0.78rem; z-index: 10000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      header, .lang-bar { padding: 12px 16px; }
      main { grid-template-columns: 1fr; grid-template-rows: auto auto; height: auto; min-height: calc(100vh - 115px); }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); min-height: 45vh; }
      .panel-right { min-height: 50vh; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">📷</div>
      <div class="logo-text">Foto<span>Text</span></div>
    </div>
    <div class="free-badge">✓ Zdarma · Bez API</div>
  </header>

  <div class="lang-bar">
    <span class="lang-label">🌐 Jazyk textu na fotkách:</span>
    <select class="lang-select" id="langSelect">
      <option value="ces">Čeština</option>
      <option value="ces+eng">Čeština + Angličtina</option>
      <option value="eng">Angličtina</option>
      <option value="slk">Slovenština</option>
      <option value="deu">Němčina</option>
      <option value="fra">Francouzština</option>
      <option value="pol">Polština</option>
    </select>
    <span class="lang-note">První spuštění stáhne jazykový balíček (~4 MB)</span>
  </div>

  <main>
    <div class="panel-left">
      <div class="panel-header">
        <span class="panel-title">Fotografie</span>
        <span class="count-badge" id="countBadge">0 souborů</span>
      </div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" multiple />
        <span class="drop-icon">📁</span>
        <div class="drop-text">
          <strong>Klikni nebo přetáhni fotky</strong><br>
          JPG, PNG, WEBP · více souborů najednou
        </div>
      </div>
      <div class="image-list" id="imageList"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="controls">
        <button class="btn btn-primary" id="extractBtn" disabled>▶ Extrahovat text</button>
        <button class="btn btn-ghost" id="clearBtn" disabled>✕ Vyčistit</button>
      </div>
    </div>

    <div class="panel-right">
      <div class="panel-header">
        <span class="panel-title">Výsledný text</span>
        <span class="count-badge" id="resultBadge">–</span>
      </div>
      <div class="output-area" id="outputArea">
        <div class="output-placeholder" id="placeholder">
          <span class="icon">✦</span>
          <p>Nahraj fotografie a klikni<br><strong style="color:var(--accent)">Extrahovat text</strong><br><span style="font-size:0.7rem;opacity:0.7">Vše běží v prohlížeči · zdarma · bez API</span></p>
        </div>
      </div>
      <div class="output-actions">
        <button class="btn btn-primary" id="copyAllBtn" disabled style="max-width:190px;background:var(--accent2);color:#0a0a0a;font-weight:700;">⎘ Zkopírovat vše</button>
        <button class="btn btn-ghost" id="downloadBtn" disabled style="max-width:150px;">↓ Stáhnout .txt</button>
        <span class="chars-count" id="charsCount"></span>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
let files = [], idCounter = 0, isProcessing = false, worker = null;

const $ = id => document.getElementById(id);
const fileInput = $('fileInput'), dropZone = $('dropZone'), imageList = $('imageList');
const extractBtn = $('extractBtn'), clearBtn = $('clearBtn');
const copyAllBtn = $('copyAllBtn'), downloadBtn = $('downloadBtn');
const outputArea = $('outputArea'), placeholder = $('placeholder');
const countBadge = $('countBadge'), resultBadge = $('resultBadge');
const progressFill = $('progressFill'), charsCount = $('charsCount');
const langSelect = $('langSelect');

fileInput.addEventListener('change', e => addFiles([...e.target.files]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});

function addFiles(newFiles) {
  newFiles.forEach(f => files.push({ file: f, id: ++idCounter, status: 'waiting', text: '', progress: 0 }));
  renderList(); updateUI(); fileInput.value = '';
}

function renderList() {
  imageList.innerHTML = '';
  files.forEach((item, idx) => {
    const url = URL.createObjectURL(item.file);
    const div = document.createElement('div');
    div.className = `image-item ${item.status !== 'waiting' ? item.status : ''}`;
    div.dataset.id = item.id;
    div.innerHTML = `
      <img class="item-thumb" src="${url}" />
      <div class="item-info">
        <div class="item-name">${item.file.name}</div>
        <div class="item-status">
          <span class="status-dot ${item.status === 'waiting' ? '' : item.status}"></span>
          <span id="stxt-${item.id}">${statusLabel(item.status)}</span>
        </div>
        <div class="item-progress">
          <div class="item-progress-fill" id="pf-${item.id}" style="width:${item.progress}%"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
        <div class="item-order">${idx + 1}</div>
        ${!isProcessing ? `<button onclick="removeFile(${item.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;" title="Odebrat">✕</button>` : ''}
      </div>
    `;
    imageList.appendChild(div);
  });
}

const statusLabel = s => ({ waiting:'Čeká', processing:'Zpracovávám...', done:'Hotovo ✓', error:'Chyba' }[s] || s);

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  renderList(); updateUI(); renderResults();
}

function updateUI() {
  const n = files.length;
  countBadge.textContent = `${n} ${n===1?'soubor':n<5?'soubory':'souborů'}`;
  extractBtn.disabled = n === 0 || isProcessing;
  clearBtn.disabled = n === 0 || isProcessing;
  const done = files.filter(f => f.status === 'done');
  copyAllBtn.disabled = downloadBtn.disabled = done.length === 0;
  resultBadge.textContent = done.length > 0 ? `${done.length} stran` : '–';
  const total = done.map(f => f.text).join('').length;
  charsCount.textContent = total > 0 ? `${total.toLocaleString()} znaků` : '';
}

extractBtn.addEventListener('click', startExtraction);

async function startExtraction() {
  if (isProcessing || files.length === 0) return;
  isProcessing = true;
  files.forEach(f => { f.status = 'waiting'; f.text = ''; f.progress = 0; });
  renderList(); renderResults(); updateUI();

  const lang = langSelect.value;
  showToast('⏳ Inicializuji OCR engine...');

  if (worker) { try { await worker.terminate(); } catch(e){} worker = null; }

  try {
    worker = await Tesseract.createWorker(lang, 1, {
      workerPath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/worker.min.js',
      corePath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js-core/5.0.0/tesseract-core-simd-lstm.wasm.js',
      langPath: 'https://tessdata.projectnaptha.com/4.0.0'
    });
  } catch(e) {
    // fallback - default CDN
    worker = await Tesseract.createWorker(lang);
  }

  const total = files.length;

  for (let i = 0; i < files.length; i++) {
    const item = files[i];
    item.status = 'processing'; item.progress = 5;
    updateItemUI(item);

    try {
      const result = await worker.recognize(item.file, {}, {
        imageColor: true
      });
      item.progress = 100;
      item.text = (result.data.text || '').trim();
      if (!item.text) item.text = '(Na obrázku nebyl rozpoznán žádný text)';
      item.status = 'done';
    } catch(err) {
      item.text = `[Chyba OCR: ${err.message}]`;
      item.status = 'error';
    }

    progressFill.style.width = `${((i + 1) / total) * 100}%`;
    updateItemUI(item);
    renderResults();
    updateUI();
  }

  isProcessing = false;
  renderList(); updateUI();
  progressFill.style.width = '0%';
  showToast('✓ Extrakce dokončena');
}

function updateItemUI(item) {
  const el = document.querySelector(`.image-item[data-id="${item.id}"]`);
  if (!el) return;
  el.className = `image-item ${item.status !== 'waiting' ? item.status : ''}`;
  const dot = el.querySelector('.status-dot');
  if (dot) dot.className = `status-dot ${item.status === 'waiting' ? '' : item.status}`;
  const txt = $(`stxt-${item.id}`);
  if (txt) txt.textContent = statusLabel(item.status);
  const fill = $(`pf-${item.id}`);
  if (fill) fill.style.width = item.progress + '%';
}

function renderResults() {
  const withText = files.filter(f => f.status === 'done' || f.status === 'error');
  if (withText.length === 0) { outputArea.innerHTML = ''; outputArea.appendChild(placeholder); return; }
  outputArea.innerHTML = '';
  let vi = 0;
  files.forEach((item, idx) => {
    if (item.status !== 'done' && item.status !== 'error') return;
    vi++;
    const block = document.createElement('div');
    block.className = 'result-block';
    block.innerHTML = `
      <div class="result-header">
        <span class="result-num">#${idx + 1}</span>
        <span class="result-name">${item.file.name}</span>
        <button class="result-copy-btn" onclick="copyOne(${item.id})">⎘ Kopírovat</button>
      </div>
      <div class="result-text">${escHtml(item.text)}</div>
    `;
    if (vi < withText.length) { const hr = document.createElement('hr'); hr.className = 'result-divider'; block.appendChild(hr); }
    outputArea.appendChild(block);
  });
}

const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function copyOne(id) {
  const item = files.find(f => f.id === id);
  if (item) navigator.clipboard.writeText(item.text).then(() => showToast('✓ Zkopírováno'));
}
copyAllBtn.addEventListener('click', () => {
  const txt = files.filter(f=>f.status==='done').map((f,i)=>`=== Strana ${i+1}: ${f.file.name} ===\n${f.text}`).join('\n\n');
  navigator.clipboard.writeText(txt).then(() => showToast('✓ Veškerý text zkopírován'));
});
downloadBtn.addEventListener('click', () => {
  const txt = files.filter(f=>f.status==='done').map((f,i)=>`=== Strana ${i+1}: ${f.file.name} ===\n${f.text}`).join('\n\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download = `fototext-${Date.now()}.txt`; a.click();
  showToast('✓ Soubor stažen');
});
clearBtn.addEventListener('click', () => {
  files=[]; renderList(); renderResults(); updateUI(); progressFill.style.width='0%';
});

let toastTimer;
function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
